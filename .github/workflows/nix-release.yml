name: nix-release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: echo "tag=pushbuild.$(date +%Y%m%d).$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build
        run: nix-shell --run "cargo build --release"

      - name: Delete existing release with same tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view ${{ steps.tag.outputs.tag }} &>/dev/null; then
            gh release delete ${{ steps.tag.outputs.tag }} --yes
            git push --delete origin ${{ steps.tag.outputs.tag }} || true
          fi

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          prerelease: true
          body: |
            Automated build from commit ${{ github.sha }}
            Triggered by: ${{ github.event_name }}
            Run: ${{ github.run_id }}
          files: |
            target/release/c2rust-asm
            target/release/c2rust-bitfields
            target/release/c2rust-cargo-metadata
            target/release/c2rust-cc
            target/release/c2rust-check
            target/release/c2rust-cross-check
            target/release/c2rust-docker
            target/release/c2rust-expand
            target/release/c2rust-json-expr
            target/release/c2rust-lint
            target/release/c2rust-patch
            target/release/c2rust-refactor
            target/release/c2rust-transpile
            target/release/c2rust-unnamer
            target/release/c2rust
            target/release/rust-c2rust
